<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resistor WASM Reference</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #ccc; }
    h1 { color: #fff; }
    h2 { color: #aaa; border-bottom: 1px solid #333; padding-bottom: 4px; margin-top: 2rem; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 1rem; margin: 1rem 0; }
    label { display: block; margin-top: 0.5rem; color: #888; font-size: 0.85rem; }
    input, select { background: #222; border: 1px solid #444; color: #ccc; padding: 4px 8px; border-radius: 3px; width: 100%; box-sizing: border-box; margin-top: 2px; }
    button { background: #2a5; border: none; color: #fff; padding: 6px 16px; border-radius: 3px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #3b6; }
    pre { background: #0d0d0d; border: 1px solid #333; border-radius: 4px; padding: 0.75rem; overflow-x: auto; font-size: 0.82rem; line-height: 1.5; white-space: pre-wrap; }
    .ok { color: #4c4; }
    .err { color: #c44; }
    #status { padding: 0.5rem 1rem; border-radius: 4px; margin: 1rem 0; }
    #status.loading { background: #222; color: #888; }
    #status.ready { background: #1a2a1a; color: #4c4; }
    #status.failed { background: #2a1a1a; color: #c44; }
  </style>
</head>
<body>

<h1>Resistor WASM Reference</h1>
<div id="status" class="loading">Loading WASM module…</div>

<!-- ------------------------------------------------------------------ -->
<h2>decodeBands</h2>
<div class="card">
  <label>Bands (comma-separated color names)</label>
  <input id="db-bands" value="green,brown,brown,gold" />
  <button onclick="runDecodeBands()">Decode</button>
  <pre id="db-out">—</pre>
</div>

<!-- ------------------------------------------------------------------ -->
<h2>encodeBands</h2>
<div class="card">
  <label>Resistance (Ω)</label>
  <input id="eb-r" value="510" />
  <label>Tolerance (%)</label>
  <input id="eb-t" value="5" />
  <label>Temp Coeff (PPM, optional — for 6-band)</label>
  <input id="eb-tc" value="" placeholder="e.g. 50" />
  <button onclick="runEncodeBands()">Encode</button>
  <pre id="eb-out">—</pre>
</div>

<!-- ------------------------------------------------------------------ -->
<h2>decodeSMD</h2>
<div class="card">
  <label>SMD Marking</label>
  <input id="ds-marking" value="472" />
  <button onclick="runDecodeSMD()">Decode</button>
  <pre id="ds-out">—</pre>
</div>

<!-- ------------------------------------------------------------------ -->
<h2>encodeSMD</h2>
<div class="card">
  <label>Resistance (Ω)</label>
  <input id="es-r" value="4700" />
  <label>Mode</label>
  <select id="es-mode">
    <option value="auto">auto</option>
    <option value="standard">standard</option>
    <option value="eia96">eia96</option>
  </select>
  <button onclick="runEncodeSMD()">Encode</button>
  <pre id="es-out">—</pre>
</div>

<!-- ------------------------------------------------------------------ -->
<h2>nearestStandard</h2>
<div class="card">
  <label>Value (Ω)</label>
  <input id="ns-val" value="487" />
  <label>Series</label>
  <select id="ns-series">
    <option>E3</option><option>E6</option><option>E12</option>
    <option selected>E24</option><option>E48</option>
    <option>E96</option><option>E192</option>
  </select>
  <label>Rounding Mode</label>
  <select id="ns-mode">
    <option value="nearest">nearest</option>
    <option value="up">up</option>
    <option value="down">down</option>
  </select>
  <button onclick="runNearestStandard()">Snap</button>
  <pre id="ns-out">—</pre>
</div>

<!-- ------------------------------------------------------------------ -->
<h2>selectStandardResistor</h2>
<div class="card">
  <label>Resistance (Ω)</label>
  <input id="ssr-r" value="487" />
  <label>Series (blank = E24)</label>
  <input id="ssr-s" value="" placeholder="E24" />
  <label>Tolerance % (blank = default)</label>
  <input id="ssr-t" value="" placeholder="5" />
  <label>Rounding (blank = nearest)</label>
  <input id="ssr-round" value="" placeholder="nearest" />
  <button onclick="runSelect()">Select</button>
  <pre id="ssr-out">—</pre>
</div>

<!-- ------------------------------------------------------------------ -->
<h2>inferResistor</h2>
<div class="card">
  <label>Bands (comma-separated, optional)</label>
  <input id="ir-bands" value="brown,black,red,gold" />
  <label>Body Color (optional)</label>
  <input id="ir-body" value="blue" />
  <label>Length mm (optional)</label>
  <input id="ir-len" value="6.3" />
  <label>Package (optional)</label>
  <input id="ir-pkg" value="" placeholder="through_hole / 0603 / …" />
  <label>SMD Marking (optional)</label>
  <input id="ir-marking" value="" placeholder="e.g. 472" />
  <button onclick="runInfer()">Infer</button>
  <pre id="ir-out">—</pre>
</div>

<!-- ------------------------------------------------------------------ -->
<h2>analyzeResistor</h2>
<div class="card">
  <label>Resistance (Ω)</label>
  <input id="ar-r" value="100" />
  <label>Power Rating (W, optional)</label>
  <input id="ar-p" value="0.25" />
  <label>Tolerance % (optional)</label>
  <input id="ar-t" value="5" />
  <label>Applied Voltage (V)</label>
  <input id="ar-v" value="10" />
  <label>Applied Current (A, optional)</label>
  <input id="ar-i" value="" placeholder="e.g. 0.1" />
  <button onclick="runAnalyze()">Analyze</button>
  <pre id="ar-out">—</pre>
</div>

<script src="wasm_exec.js"></script>
<script>
  const go = new Go();
  const statusEl = document.getElementById('status');

  WebAssembly.instantiateStreaming(fetch('resistor.wasm'), go.importObject)
    .then(result => {
      go.run(result.instance);
      statusEl.textContent = 'WASM module ready';
      statusEl.className = 'ready';
    })
    .catch(err => {
      statusEl.textContent = 'Failed to load WASM: ' + err;
      statusEl.className = 'failed';
    });

  function show(id, result) {
    const el = document.getElementById(id);
    const text = JSON.stringify(result, null, 2);
    el.textContent = text;
    el.className = result.ok ? 'ok' : 'err';
  }

  function runDecodeBands() {
    const bands = document.getElementById('db-bands').value
      .split(',').map(s => s.trim()).filter(Boolean);
    show('db-out', resistor.decodeBands(JSON.stringify(bands)));
  }

  function runEncodeBands() {
    const spec = {
      resistanceOhms: parseFloat(document.getElementById('eb-r').value),
      tolerancePct:   parseFloat(document.getElementById('eb-t').value) || 0,
    };
    const tc = document.getElementById('eb-tc').value;
    if (tc) spec.tempCoeffPPM = parseInt(tc, 10);
    show('eb-out', resistor.encodeBands(JSON.stringify(spec)));
  }

  function runDecodeSMD() {
    show('ds-out', resistor.decodeSMD(document.getElementById('ds-marking').value.trim()));
  }

  function runEncodeSMD() {
    const input = {
      resistance: parseFloat(document.getElementById('es-r').value),
      mode: document.getElementById('es-mode').value,
    };
    show('es-out', resistor.encodeSMD(JSON.stringify(input)));
  }

  function runNearestStandard() {
    const input = {
      value:  parseFloat(document.getElementById('ns-val').value),
      series: document.getElementById('ns-series').value,
      mode:   document.getElementById('ns-mode').value,
    };
    show('ns-out', resistor.nearestStandard(JSON.stringify(input)));
  }

  function runSelect() {
    const input = { resistance: parseFloat(document.getElementById('ssr-r').value) };
    const s = document.getElementById('ssr-s').value.trim();
    const t = document.getElementById('ssr-t').value.trim();
    const r = document.getElementById('ssr-round').value.trim();
    if (s) input.series       = s;
    if (t) input.tolerancePct = parseFloat(t);
    if (r) input.rounding     = r;
    show('ssr-out', resistor.selectStandardResistor(JSON.stringify(input)));
  }

  function runInfer() {
    const input = {};
    const bands = document.getElementById('ir-bands').value.trim();
    if (bands) input.bands = bands.split(',').map(s => s.trim()).filter(Boolean);
    const body = document.getElementById('ir-body').value.trim();
    if (body) input.bodyColor = body;
    const len = document.getElementById('ir-len').value.trim();
    if (len) input.lengthMM = parseFloat(len);
    const pkg = document.getElementById('ir-pkg').value.trim();
    if (pkg) input.package = pkg;
    const marking = document.getElementById('ir-marking').value.trim();
    if (marking) input.marking = marking;
    show('ir-out', resistor.inferResistor(JSON.stringify(input)));
  }

  function runAnalyze() {
    const input = {
      spec: {
        resistanceOhms: parseFloat(document.getElementById('ar-r').value),
        powerWatts:     parseFloat(document.getElementById('ar-p').value) || 0,
        tolerancePct:   parseFloat(document.getElementById('ar-t').value) || 0,
      },
    };
    const v = document.getElementById('ar-v').value.trim();
    const i = document.getElementById('ar-i').value.trim();
    if (v) input.appliedVoltage = parseFloat(v);
    if (i) input.appliedCurrent = parseFloat(i);
    show('ar-out', resistor.analyzeResistor(JSON.stringify(input)));
  }
</script>
</body>
</html>

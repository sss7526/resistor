name: CI

on:
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l ./...)"
      - run: make test-all
      - run: make smoke
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: make vuln
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --enable-only=errcheck,govet,ineffassign,staticcheck,unused,gosec,modernize --timeout=5m

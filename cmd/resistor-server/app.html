<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Resistor calculator: select standard values, decode/encode color bands, SMD markings, infer properties, and analyze electrical behaviour.">
  <title>Resistor Calculator</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

<a class="skip-link" href="#main-content">Skip to content</a>

<header>
  <h1>Resistor Calculator</h1>
</header>

<div id="wasm-status" data-state="loading" role="status" aria-live="polite">Loading WASM module…</div>

<main id="main-content">

  <!-- ------------------------------------------------------------------ -->
  <!-- Tab bar                                                              -->
  <!-- ------------------------------------------------------------------ -->
  <nav aria-label="Calculator functions">
    <div role="tablist">
      <button role="tab" id="tab-select"  aria-selected="true"  aria-controls="panel-select"  tabindex="0">Select</button>
      <button role="tab" id="tab-bands"   aria-selected="false" aria-controls="panel-bands"   tabindex="-1">Decode Bands</button>
      <button role="tab" id="tab-encode"  aria-selected="false" aria-controls="panel-encode"  tabindex="-1">Encode Bands</button>
      <button role="tab" id="tab-smd"     aria-selected="false" aria-controls="panel-smd"     tabindex="-1">SMD</button>
      <button role="tab" id="tab-infer"   aria-selected="false" aria-controls="panel-infer"   tabindex="-1">Infer</button>
      <button role="tab" id="tab-analyze" aria-selected="false" aria-controls="panel-analyze" tabindex="-1">Analyze</button>
    </div>
  </nav>

  <!-- ------------------------------------------------------------------ -->
  <!-- Panel: Select Standard Resistor                                     -->
  <!-- ------------------------------------------------------------------ -->
  <section id="panel-select" role="tabpanel" aria-labelledby="tab-select">
    <div class="card">
      <p class="card-title">Select Standard Resistor</p>
      <div class="row">
        <div class="field">
          <label for="sel-r">Resistance (Ω)</label>
          <input type="number" id="sel-r" min="0.001" step="any" placeholder="e.g. 487" value="487">
        </div>
        <div class="field">
          <label for="sel-series">Series</label>
          <select id="sel-series">
            <option value="E3">E3</option>
            <option value="E6">E6</option>
            <option value="E12">E12</option>
            <option value="E24" selected>E24</option>
            <option value="E48">E48</option>
            <option value="E96">E96</option>
            <option value="E192">E192</option>
          </select>
        </div>
        <div class="field">
          <label for="sel-round">Rounding</label>
          <select id="sel-round">
            <option value="nearest" selected>Nearest</option>
            <option value="up">Up</option>
            <option value="down">Down</option>
          </select>
        </div>
      </div>
      <button id="btn-select" class="action" disabled>Select</button>
      <div id="sel-out" class="result" aria-live="polite" aria-atomic="true"></div>
    </div>
  </section>

  <!-- ------------------------------------------------------------------ -->
  <!-- Panel: Decode Bands                                                  -->
  <!-- ------------------------------------------------------------------ -->
  <section id="panel-bands" role="tabpanel" aria-labelledby="tab-bands" hidden>
    <div class="card">
      <p class="card-title">Decode Color Bands</p>

      <div class="field">
        <label for="db-count">Band count</label>
        <select id="db-count">
          <option value="3">3 bands</option>
          <option value="4" selected>4 bands</option>
          <option value="5">5 bands</option>
          <option value="6">6 bands</option>
        </select>
      </div>

      <!-- Band 1 -->
      <div class="field" id="db-row1">
        <label for="db-band1">Band 1 (first digit)</label>
        <select id="db-band1">
          <option value="black">black</option>
          <option value="brown" selected>brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
        </select>
      </div>

      <!-- Band 2 -->
      <div class="field" id="db-row2">
        <label for="db-band2">Band 2 (second digit)</label>
        <select id="db-band2">
          <option value="black">black</option>
          <option value="brown">brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green" selected>green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
        </select>
      </div>

      <!-- Band 3 -->
      <div class="field" id="db-row3">
        <label for="db-band3">Band 3 (third digit / multiplier)</label>
        <select id="db-band3">
          <option value="black">black</option>
          <option value="brown" selected>brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
          <option value="gold">gold</option>
          <option value="silver">silver</option>
        </select>
      </div>

      <!-- Band 4 -->
      <div class="field" id="db-row4">
        <label for="db-band4">Band 4 (multiplier / tolerance)</label>
        <select id="db-band4">
          <option value="black">black</option>
          <option value="brown">brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
          <option value="gold" selected>gold</option>
          <option value="silver">silver</option>
          <option value="none">none</option>
        </select>
      </div>

      <!-- Band 5 (hidden by default) -->
      <div class="field" id="db-row5" hidden>
        <label for="db-band5">Band 5 (tolerance)</label>
        <select id="db-band5">
          <option value="brown">brown</option>
          <option value="red">red</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="gold" selected>gold</option>
          <option value="silver">silver</option>
          <option value="none">none</option>
        </select>
      </div>

      <!-- Band 6 (hidden by default) -->
      <div class="field" id="db-row6" hidden>
        <label for="db-band6">Band 6 (temp. coeff.)</label>
        <select id="db-band6">
          <option value="black">black</option>
          <option value="brown" selected>brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
        </select>
      </div>

      <button id="btn-decode-bands" class="action" disabled>Decode</button>
      <div id="decode-bands-out" class="result" aria-live="polite" aria-atomic="true"></div>
    </div>
  </section>

  <!-- ------------------------------------------------------------------ -->
  <!-- Panel: Encode Bands                                                  -->
  <!-- ------------------------------------------------------------------ -->
  <section id="panel-encode" role="tabpanel" aria-labelledby="tab-encode" hidden>
    <div class="card">
      <p class="card-title">Encode to Color Bands</p>
      <div class="row">
        <div class="field">
          <label for="eb-r">Resistance (Ω)</label>
          <input type="number" id="eb-r" min="0.001" step="any" placeholder="e.g. 510" value="510">
        </div>
        <div class="field">
          <label for="eb-tol">Tolerance (%)</label>
          <input type="number" id="eb-tol" min="0" step="any" placeholder="5" value="5">
        </div>
      </div>
      <button id="btn-encode-bands" class="action" disabled>Encode</button>
      <div id="encode-bands-out" class="result" aria-live="polite" aria-atomic="true"></div>
    </div>
  </section>

  <!-- ------------------------------------------------------------------ -->
  <!-- Panel: SMD                                                           -->
  <!-- ------------------------------------------------------------------ -->
  <section id="panel-smd" role="tabpanel" aria-labelledby="tab-smd" hidden>

    <div class="card">
      <p class="card-title">Decode SMD Marking</p>
      <div class="field">
        <label for="smd-marking">Marking</label>
        <input type="text" id="smd-marking" placeholder="e.g. 472 or 4R7 or 01X" value="472">
      </div>
      <button id="btn-smd-decode" class="action" disabled>Decode</button>
      <div id="smd-decode-out" class="result" aria-live="polite" aria-atomic="true"></div>
    </div>

    <div class="card">
      <p class="card-title">Encode to SMD Marking</p>
      <div class="row">
        <div class="field">
          <label for="smd-enc-r">Resistance (Ω)</label>
          <input type="number" id="smd-enc-r" min="0.001" step="any" placeholder="e.g. 4700" value="4700">
        </div>
        <div class="field">
          <label for="smd-mode">Mode</label>
          <select id="smd-mode">
            <option value="auto" selected>Auto</option>
            <option value="standard">Standard (3/4-digit)</option>
            <option value="eia96">EIA-96</option>
          </select>
        </div>
      </div>
      <button id="btn-smd-encode" class="action" disabled>Encode</button>
      <div id="smd-encode-out" class="result" aria-live="polite" aria-atomic="true"></div>
    </div>

  </section>

  <!-- ------------------------------------------------------------------ -->
  <!-- Panel: Infer                                                         -->
  <!-- ------------------------------------------------------------------ -->
  <section id="panel-infer" role="tabpanel" aria-labelledby="tab-infer" hidden>
    <div class="card">
      <p class="card-title">Infer Resistor from Observations</p>

      <div class="field">
        <label for="infer-count">Band count (0 = no bands)</label>
        <select id="infer-count">
          <option value="0">0 — no bands</option>
          <option value="3">3 bands</option>
          <option value="4" selected>4 bands</option>
          <option value="5">5 bands</option>
          <option value="6">6 bands</option>
        </select>
      </div>

      <!-- Infer band 1 -->
      <div class="field" id="infer-row1">
        <label for="infer-band1">Band 1</label>
        <select id="infer-band1">
          <option value="none">none</option>
          <option value="black">black</option>
          <option value="brown" selected>brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
          <option value="gold">gold</option>
          <option value="silver">silver</option>
        </select>
      </div>

      <!-- Infer band 2 -->
      <div class="field" id="infer-row2">
        <label for="infer-band2">Band 2</label>
        <select id="infer-band2">
          <option value="none">none</option>
          <option value="black">black</option>
          <option value="brown">brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green" selected>green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
          <option value="gold">gold</option>
          <option value="silver">silver</option>
        </select>
      </div>

      <!-- Infer band 3 -->
      <div class="field" id="infer-row3">
        <label for="infer-band3">Band 3</label>
        <select id="infer-band3">
          <option value="none">none</option>
          <option value="black">black</option>
          <option value="brown" selected>brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
          <option value="gold">gold</option>
          <option value="silver">silver</option>
        </select>
      </div>

      <!-- Infer band 4 -->
      <div class="field" id="infer-row4">
        <label for="infer-band4">Band 4</label>
        <select id="infer-band4">
          <option value="none">none</option>
          <option value="black">black</option>
          <option value="brown">brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
          <option value="gold" selected>gold</option>
          <option value="silver">silver</option>
        </select>
      </div>

      <!-- Infer band 5 (hidden by default) -->
      <div class="field" id="infer-row5" hidden>
        <label for="infer-band5">Band 5</label>
        <select id="infer-band5">
          <option value="none">none</option>
          <option value="brown">brown</option>
          <option value="red">red</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="gold" selected>gold</option>
          <option value="silver">silver</option>
        </select>
      </div>

      <!-- Infer band 6 (hidden by default) -->
      <div class="field" id="infer-row6" hidden>
        <label for="infer-band6">Band 6</label>
        <select id="infer-band6">
          <option value="none">none</option>
          <option value="black">black</option>
          <option value="brown" selected>brown</option>
          <option value="red">red</option>
          <option value="orange">orange</option>
          <option value="yellow">yellow</option>
          <option value="green">green</option>
          <option value="blue">blue</option>
          <option value="violet">violet</option>
          <option value="grey">grey</option>
          <option value="white">white</option>
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label for="infer-body">Body color</label>
          <select id="infer-body">
            <option value="none" selected>none</option>
            <option value="blue">blue</option>
            <option value="green">green</option>
            <option value="beige">beige</option>
            <option value="tan">tan</option>
          </select>
        </div>
        <div class="field">
          <label for="infer-len">Length (mm)</label>
          <input type="number" id="infer-len" min="0" step="0.1" placeholder="e.g. 6.3">
        </div>
        <div class="field">
          <label for="infer-pkg">Package</label>
          <select id="infer-pkg">
            <option value="" selected>unknown</option>
            <option value="through_hole">Through-hole</option>
            <option value="axial">Axial</option>
            <option value="radial">Radial</option>
            <option value="smd">SMD (generic)</option>
            <option value="smd_0402">SMD 0402</option>
            <option value="smd_0603">SMD 0603</option>
            <option value="smd_0805">SMD 0805</option>
            <option value="smd_1206">SMD 1206</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="infer-marking">SMD marking (optional)</label>
        <input type="text" id="infer-marking" placeholder="e.g. 472">
      </div>

      <button id="btn-infer" class="action" disabled>Infer</button>
      <div id="infer-out" class="result" aria-live="polite" aria-atomic="true"></div>
    </div>
  </section>

  <!-- ------------------------------------------------------------------ -->
  <!-- Panel: Analyze                                                       -->
  <!-- ------------------------------------------------------------------ -->
  <section id="panel-analyze" role="tabpanel" aria-labelledby="tab-analyze" hidden>
    <div class="card">
      <p class="card-title">Electrical Analysis</p>
      <div class="row">
        <div class="field">
          <label for="an-r">Resistance (Ω)</label>
          <input type="number" id="an-r" min="0.001" step="any" placeholder="e.g. 100" value="100">
        </div>
        <div class="field">
          <label for="an-pwr">Power rating (W, optional)</label>
          <input type="number" id="an-pwr" min="0" step="any" placeholder="e.g. 0.25">
        </div>
        <div class="field">
          <label for="an-tol">Tolerance (%, optional)</label>
          <input type="number" id="an-tol" min="0" step="any" placeholder="e.g. 5">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="an-v">Applied voltage (V)</label>
          <input type="number" id="an-v" step="any" placeholder="e.g. 5" value="5">
        </div>
        <div class="field">
          <label for="an-i">Applied current (A, optional)</label>
          <input type="number" id="an-i" step="any" placeholder="e.g. 0.05">
        </div>
      </div>
      <button id="btn-analyze" class="action" disabled>Analyze</button>
      <div id="analyze-out" class="result" aria-live="polite" aria-atomic="true"></div>
    </div>
  </section>

</main>

<footer>
  <a href="https://github.com/sss7526/resistor" target="_blank" rel="noopener noreferrer"
     class="cta-link" aria-label="Source on GitHub">

    </svg>
    Source
  </a>
  <a href="https://pkg.go.dev/github.com/sss7526/resistor" target="_blank" rel="noopener noreferrer"
     class="cta-link" aria-label="Documentation on pkg.go.dev">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>

    Docs
  </a>
</footer>

<script src="/static/wasm_exec.js" nonce="{{.Nonce}}"></script>
<script src="/static/app.js" nonce="{{.Nonce}}"></script>
</body>
</html>
